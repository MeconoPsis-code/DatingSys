<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TenMatch - QQ 群成员资料匹配系统</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #1677ff;
      --primary-hover: #0958d9;
      --primary-light: rgba(22, 119, 255, 0.08);
      --primary-border: rgba(22, 119, 255, 0.15);
      --text-dark: #1d2129;
      --text-muted: #86909c;
      --text-light: #f2f3f5;
      --bg-white: #ffffff;
      --font-outfit: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-inter: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-inter);
      background-color: #f4f7fc;
      color: var(--text-dark);
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Outer container to mimic a high-fidelity desktop card or browser window */
    .app-window {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 1440px;
      max-height: 900px;
      aspect-ratio: 16 / 10;
      background-color: #fafbfe;
      border: 1px solid rgba(22, 119, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 72px rgba(29, 33, 41, 0.05), 0 2px 8px rgba(29, 33, 41, 0.02);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    /* Ambient background circles */
    .bg-circle-tr {
      position: absolute;
      top: -180px;
      right: -180px;
      width: 540px;
      height: 540px;
      border-radius: 50%;
      background-color: #ebf2ff;
      z-index: 0;
      pointer-events: none;
    }

    .bg-circle-bl {
      position: absolute;
      bottom: -180px;
      left: -180px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background-color: #ebf2ff;
      z-index: 0;
      pointer-events: none;
    }

    /* Header / Logo */
    header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 40px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      height: 38px;
      width: auto;
      object-fit: contain;
      mix-blend-mode: multiply;
      transition: transform 0.3s ease;
    }

    .logo-area:hover .logo-icon {
      transform: scale(1.05);
    }

    .logo-text {
      font-family: var(--font-outfit);
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-color);
      letter-spacing: -0.5px;
    }

    /* Main Content Layout */
    .main-container {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      align-items: center;
      padding: 0 80px 0 100px;
      margin-top: 60px; /* offset header */
      z-index: 2;
    }

    /* Left Column: Typography and Action */
    .content-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 540px;
    }

    /* Verified Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background-color: var(--primary-light);
      border: 1px solid var(--primary-border);
      border-radius: 100px;
      color: var(--primary-color);
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 24px;
      animation: fadeInDown 0.8s ease-out;
    }

    .badge-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      color: var(--primary-color);
    }

    /* Main Typography */
    .title-brand {
      font-family: var(--font-outfit);
      font-size: 82px;
      font-weight: 900;
      color: var(--primary-color);
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 16px;
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .title-sub {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.3;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .title-desc {
      font-size: 17px;
      color: var(--text-muted);
      font-weight: 500;
      word-spacing: 2px;
      margin-bottom: 44px;
      letter-spacing: 0.5px;
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    }

    /* CTA Button */
    .cta-container {
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 48px;
      background-color: var(--primary-color);
      color: var(--bg-white);
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(22, 119, 255, 0.25);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(22, 119, 255, 0.35);
    }

    .btn-login:active {
      transform: translateY(1px);
      box-shadow: 0 6px 16px rgba(22, 119, 255, 0.2);
    }

    .btn-login::after {
      content: '';
      position: absolute;
      top: 0;
      left: -50%;
      width: 200%;
      height: 100%;
      background: linear-gradient(
        to right,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.2) 50%,
        rgba(255, 255, 255, 0) 100%
      );
      transform: skewX(-25deg);
      transition: 0.75s;
      opacity: 0;
    }

    .btn-login:hover::after {
      left: 125%;
      opacity: 1;
    }

    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
    }

    /* Agreements Link */
    .agreement-text {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    }

    .agreement-link {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .agreement-link:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    /* Right Column: Character Portrait and Interactive Orbit */
    .content-right {
      position: relative;
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-wrapper {
      position: relative;
      width: 560px;
      height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dashed Orbit Ring */
    .orbit-ring {
      position: absolute;
      width: 480px;
      height: 380px;
      border: 1.5px dashed rgba(22, 119, 255, 0.2);
      border-radius: 50%;
      transform: rotate(-10deg);
      z-index: 1;
      pointer-events: none;
      animation: orbitRotate 180s linear infinite;
    }

    /* Character Portrait Cutout */
    .portrait-container {
      position: relative;
      width: 440px;
      height: 440px;
      margin-bottom: -40px; /* pull down slightly */
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
      animation: portraitEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .portrait-image {
      width: 100%;
      height: auto;
      object-fit: contain;
      /* Soft bottom fade-out to blend character seamlessly into background */
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 82%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 82%, rgba(0,0,0,0) 100%);
      animation: gentleFloat 6s ease-in-out infinite;
    }

    /* Orbiting Badges */
    .orbit-badge {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d3e5ff 0%, #b2d3ff 100%);
      border: 2px solid #ffffff;
      box-shadow: 0 8px 20px rgba(22, 119, 255, 0.16);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .orbit-badge:hover {
      transform: scale(1.15) translateY(-3px);
      box-shadow: 0 12px 24px rgba(22, 119, 255, 0.25);
    }

    .orbit-badge svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    /* Specific Positions of Floating Badges */
    .badge-speech {
      top: 155px;
      left: 30px;
      animation: floatBadge1 4.5s ease-in-out infinite;
    }

    .badge-shield {
      bottom: 125px;
      left: 55px;
      animation: floatBadge2 5s ease-in-out infinite;
    }

    .badge-users {
      top: 275px;
      right: 15px;
      animation: floatBadge3 5.5s ease-in-out infinite;
    }

    /* Sparkles / Twinkling Stars */
    .sparkle {
      position: absolute;
      color: rgba(22, 119, 255, 0.5);
      fill: rgba(22, 119, 255, 0.5);
      z-index: 1;
      pointer-events: none;
    }

    .sparkle-1 {
      top: 100px;
      left: 320px;
      animation: twinkle 3s ease-in-out infinite;
    }

    .sparkle-2 {
      top: 180px;
      right: 20px;
      animation: twinkle 4s ease-in-out infinite 1s;
    }

    .sparkle-3 {
      bottom: 160px;
      left: 10px;
      animation: twinkle 3.5s ease-in-out infinite 0.5s;
    }

    .sparkle-4 {
      bottom: 130px;
      right: 120px;
      animation: twinkle 4.5s ease-in-out infinite 1.5s;
    }

    /* Keyframes Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes portraitEntrance {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(40px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes gentleFloat {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes orbitRotate {
      from {
        transform: rotate(-10deg);
      }
      to {
        transform: rotate(350deg);
      }
    }

    /* Gentle floating animations for individual badges at different frequencies */
    @keyframes floatBadge1 {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-10px) scale(1.02);
      }
    }

    @keyframes floatBadge2 {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(12px) scale(0.98);
      }
    }

    @keyframes floatBadge3 {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-8px) scale(1.03);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.85;
        transform: scale(1.2);
      }
    }

    /* Responsive Design for PC aspect ratios and tablet fallbacks */
    @media (max-width: 1200px) {
      .title-brand {
        font-size: 68px;
      }
      .title-sub {
        font-size: 28px;
      }
      .scene-wrapper {
        width: 480px;
        height: 480px;
      }
      .orbit-ring {
        width: 400px;
        height: 320px;
      }
      .portrait-container {
        width: 360px;
        height: 360px;
      }
    }

    @media (max-width: 992px) {
      body {
        overflow-y: auto;
      }
      .app-window {
        max-height: none;
        aspect-ratio: auto;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
        border: none;
      }
      .main-container {
        grid-template-columns: 1fr;
        padding: 40px 40px 80px;
        text-align: center;
        gap: 60px;
      }
      .content-left {
        align-items: center;
        max-width: 100%;
      }
      .badge {
        animation: fadeInDown 0.8s ease-out;
      }
      .title-brand, .title-sub, .title-desc, .cta-container, .agreement-text {
        animation: fadeInDown 0.8s ease-out both;
      }
    }
  </style>
</head>
<body>

  <!-- Outer Window Wrapper -->
  <div class="app-window">
    
    <!-- Background Accents -->
    <div class="bg-circle-tr"></div>
    <div class="bg-circle-bl"></div>

    <!-- Top Left Header Logo -->
    <header>
      <a href="#" class="logo-area">
        <img src="./app_icon_dark.png" class="logo-icon" alt="TenMatch Icon">
        <span class="logo-text">TenMatch</span>
      </a>
    </header>

    <!-- Main Section Content -->
    <main class="main-container">
      
      <!-- Left Hero Column -->
      <section class="content-left">
        <!-- Shield Badge -->
        <div class="badge">
          <span class="badge-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/>
              <path d="m9 12 2 2 4-4"/>
            </svg>
          </span>
          仅限指定 QQ 群认证成员
        </div>

        <!-- Main Heading -->
        <h1 class="title-brand">TenMatch</h1>
        <h2 class="title-sub">QQ 群成员资料匹配系统</h2>
        <p class="title-desc">填写资料 · 自动匹配 · 保护隐私</p>

        <!-- CTA Button -->
        <div class="cta-container">
          <button class="btn-login">
            <span class="btn-icon">
              <!-- Bell Icon matching mainpage_pc.png -->
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
              </svg>
            </span>
            进入登录
          </button>
        </div>

        <!-- Terms Policy Link -->
        <p class="agreement-text">
          登录即表示同意<a href="#" class="agreement-link">《用户协议》</a>和<a href="#" class="agreement-link">《隐私政策》</a>
        </p>
      </section>

      <!-- Right Scene Column -->
      <section class="content-right">
        <div class="scene-wrapper">
          <!-- Sparkling Stars -->
          <svg class="sparkle sparkle-1" width="14" height="14" viewBox="0 0 24 24">
            <path d="M12 0L14.8 9.2L24 12L14.8 14.8L12 24L9.2 14.8L0 12L9.2 9.2Z" />
          </svg>
          <svg class="sparkle sparkle-2" width="18" height="18" viewBox="0 0 24 24">
            <path d="M12 0L14.8 9.2L24 12L14.8 14.8L12 24L9.2 14.8L0 12L9.2 9.2Z" />
          </svg>
          <svg class="sparkle sparkle-3" width="15" height="15" viewBox="0 0 24 24">
            <path d="M12 0L14.8 9.2L24 12L14.8 14.8L12 24L9.2 14.8L0 12L9.2 9.2Z" />
          </svg>
          <svg class="sparkle sparkle-4" width="13" height="13" viewBox="0 0 24 24">
            <path d="M12 0L14.8 9.2L24 12L14.8 14.8L12 24L9.2 14.8L0 12L9.2 9.2Z" />
          </svg>

          <!-- Dashed Orbit Line -->
          <div class="orbit-ring"></div>

          <!-- Character Portrait -->
          <div class="portrait-container">
            <img src="./portrait_transparent.png" class="portrait-image" alt="TenMatch Boy Portrait">
          </div>

          <!-- Orbit Badge: Speech Bubble -->
          <div class="orbit-badge badge-speech" title="聊天沟通">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" fill="#1677ff" stroke="#1677ff" stroke-width="2" stroke-linejoin="round"/>
              <circle cx="8" cy="10" r="1.5" fill="#ffffff"/>
              <circle cx="12" cy="10" r="1.5" fill="#ffffff"/>
              <circle cx="16" cy="10" r="1.5" fill="#ffffff"/>
            </svg>
          </div>

          <!-- Orbit Badge: Shield Check -->
          <div class="orbit-badge badge-shield" title="安全认证">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="#1677ff" stroke="#1677ff" stroke-width="2" stroke-linejoin="round"/>
              <path d="M9 11L11 13L15 9" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Orbit Badge: Users / Group Match -->
          <div class="orbit-badge badge-users" title="成员匹配">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16 8C17.66 8 19 6.66 19 5C19 3.34 17.66 2 16 2C14.34 2 13 3.34 13 5C13 6.66 14.34 8 16 8Z" fill="#1677ff" opacity="0.75"/>
              <path d="M16 10C13.67 10 9 11.17 9 13.5V16H23V13.5C23 11.17 18.33 10 16 10Z" fill="#1677ff" opacity="0.75"/>
              <path d="M8 8C9.66 8 11 6.66 11 5C11 3.34 9.66 2 8 2C6.34 2 5 3.34 5 5C5 6.66 6.34 8 8 8Z" fill="#1677ff"/>
              <path d="M8 10C5.67 10 1 11.17 1 13.5V16H15V13.5C15 11.17 10.33 10 8 10Z" fill="#1677ff"/>
            </svg>
          </div>
        </div>
      </section>

    </main>

  </div>

</body>
</html>
