# Stage 1: enable this HTTP-only site just long enough to obtain the initial
# certificate with Certbot's webroot mode. The application remains unavailable
# to public traffic and returns an explicit maintenance response.
server {
    listen 80;
    listen [::]:80;
    server_name 10match.date;

    server_tokens off;
    access_log /var/log/nginx/10match.date.access.log;
    error_log /var/log/nginx/10match.date.error.log warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        add_header Retry-After 300 always;
        return 503;
    }
}
