# Stage 2: install this file only after the certificate paths below exist.
server {
    listen 80;
    listen [::]:80;
    server_name 10match.date;

    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 10match.date;

    ssl_certificate /etc/letsencrypt/live/10match.date/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/10match.date/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TenMatchTLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    access_log /var/log/nginx/10match.date.access.log;
    error_log /var/log/nginx/10match.date.error.log warn;

    # Six report-evidence images can total 30 MiB before multipart overhead.
    client_max_body_size 40m;
    client_body_timeout 30s;
    keepalive_timeout 65s;

    add_header Strict-Transport-Security "max-age=86400" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health details expose dependency state, so monitor them locally instead
    # of publishing this endpoint on the Internet.
    location = /api/health {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        include /etc/nginx/snippets/tenmatch-proxy.conf;
    }

    location ~ /\.(?!well-known/) {
        deny all;
    }

    location / {
        include /etc/nginx/snippets/tenmatch-proxy.conf;
    }
}
